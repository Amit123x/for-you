<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="app">

    <section class="story">

        <!-- Progress -->
        <div class="progress" id="progress"></div>

        <!-- Card -->
        <div class="card">

            <!-- IMAGE -->
            <div class="media">
                <img id="cardImage" src="images/1.jpg" />
            </div>

            <!-- TEXT -->
            <div class="content" id="text"></div>

        </div>

        <!-- Buttons -->
        <div class="controls">
            <button id="prevBtn">Go Back</button>
            <button id="nextBtn">Next</button>
        </div>

        <!-- Tap zones -->
        <div class="tap left"></div>
        <div class="tap right"></div>

    </section>

    <!-- FINAL SCREEN -->
    <div class="final" id="finalScreen">
        <h2>Give me one chance?</h2>
        <div>
            <button id="yesBtn">Yes ❤️</button>
            <button id="noBtn">No 😒</button>
        </div>
    </div>

</main>

<script src="script.js"></script>

</body>
</html>
