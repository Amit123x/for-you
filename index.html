<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="app">

    <section class="story">

        <!-- Progress -->
        <div class="progress" id="progress"></div>

        <!-- Card -->
        <div class="card">

            <img id="cardImage" class="card-image" src="" />

            <div id="text" class="content"></div>

        </div>

        <!-- Buttons -->
        <div class="controls">
            <button id="prevBtn">Go Back</button>
            <button id="nextBtn">Next</button>
        </div>

    </section>

    <!-- Final Screen -->
    <section id="finalScreen" class="final hidden">
        <h2>Give me one chance?</h2>
        <div class="final-buttons">
            <button id="yesBtn">Yes ❤️</button>
            <button id="noBtn">No 💔</button>
        </div>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
